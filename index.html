<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test N8N</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 16px; }
    input { display: block; width: 100%; padding: 10px; margin-bottom: 12px; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #E05B5B; color: white; border: none; font-size: 16px; cursor: pointer; }
    #status { margin-top: 16px; padding: 12px; border-radius: 6px; display: none; }
    .ok  { background: #d4edda; color: #155724; }
    .err { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

  <h2>Test Webhook N8N</h2>

  <input type="text"  id="nombre"   placeholder="Nombre" />
  <input type="email" id="correo"   placeholder="Correo" />
  <input type="tel"   id="telefono" placeholder="Teléfono" />

  <button onclick="enviar()">Enviar prueba</button>

  <div id="status"></div>

  <script>
    const WEBHOOK = 'https://solucione.app.n8n.cloud/webhook/c3901cfb-4296-4593-be7c-0836877a8fbe';

    async function enviar() {
      const status = document.getElementById('status');
      status.style.display = 'none';

      const data = {
        nombre:    document.getElementById('nombre').value,
        correo:    document.getElementById('correo').value,
        telefono:  document.getElementById('telefono').value,
        timestamp: new Date().toISOString(),
        origen:    'test',
      };

      try {
        await fetch(WEBHOOK, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(data),
          mode:    'no-cors',
        });

        status.className     = 'ok';
        status.textContent   = '✅ Enviado. Revisa N8N y Google Sheets.';
        status.style.display = 'block';

      } catch (e) {
        status.className     = 'err';
        status.textContent   = '❌ Error: ' + e.message;
        status.style.display = 'block';
      }
    }
  </script>

</body>
</html>
